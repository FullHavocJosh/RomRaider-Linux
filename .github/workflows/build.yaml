name: RomRaider build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Setup Java 8
        uses: actions/setup-java@v1.4.3
        with:
          java-version: "8"
          java-package: jdk
          architecture: x64
      - name: set JRE_DIR environment variable
        shell: bash
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: true
        run: echo ::set-env name=JRE_DIR::$(echo $JAVA_HOME)/jre

      - name: Test Compiler
        run: javac -version

      - name: All
        run: |
          echo JRE_DIR=$JRE_DIR
          ant all

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Install container prerequisites
        run: dnf install -y git tar gzip

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 8 (compile)
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          architecture: x64

      - name: Setup Java 21 (jpackage)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          architecture: x64

      - name: Install rpm packaging tools
        run: dnf install -y ant rpm-build ImageMagick binutils

      # Ant's -init target uses a Nashorn scriptdef (removed in JDK 15+), so
      # `ant` itself must run under JDK 8 even though jpackage needs JDK 21.
      - name: Build Linux jar
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_8_X64 }}
          JRE_DIR: ${{ env.JAVA_HOME_8_X64 }}/jre
        run: |
          echo JRE_DIR=$JRE_DIR
          ant build-linux

      # The env context has no pre-populated PATH field, so
      # `PATH: ...${{ env.PATH }}` silently evaluates to empty and clobbers
      # the real PATH instead of prepending to it. Extend it in the shell
      # instead, where $PATH is the real inherited environment variable.
      - name: Build .rpm
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_8_X64 }}
          JRE_DIR: ${{ env.JAVA_HOME_8_X64 }}/jre
        run: |
          export PATH="$JAVA_HOME_21_X64/bin:$PATH"
          jpackage --version
          ant rpm

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: romraider-fedora-rpm
          path: build/dist/linux/*.rpm

  build-ubuntu:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 8 (compile)
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          architecture: x64

      - name: Setup Java 21 (jpackage)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          architecture: x64

      - name: Install deb packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ant fakeroot imagemagick binutils

      # Ant's -init target uses a Nashorn scriptdef (removed in JDK 15+), so
      # `ant` itself must run under JDK 8 even though jpackage needs JDK 21.
      - name: Build Linux jar
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_8_X64 }}
          JRE_DIR: ${{ env.JAVA_HOME_8_X64 }}/jre
        run: |
          echo JRE_DIR=$JRE_DIR
          ant build-linux

      # The env context has no pre-populated PATH field, so
      # `PATH: ...${{ env.PATH }}` silently evaluates to empty and clobbers
      # the real PATH instead of prepending to it. Extend it in the shell
      # instead, where $PATH is the real inherited environment variable.
      - name: Build .deb
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_8_X64 }}
          JRE_DIR: ${{ env.JAVA_HOME_8_X64 }}/jre
        run: |
          export PATH="$JAVA_HOME_21_X64/bin:$PATH"
          jpackage --version
          ant deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: romraider-ubuntu-deb
          path: build/dist/linux/*.deb

  build-flatpak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 8 (compile)
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          architecture: x64

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ant imagemagick flatpak flatpak-builder

      # The runner user has no polkit authorization for system-wide Flatpak
      # changes, so --system (the default) fails with "not allowed for
      # user" — use --user throughout instead.
      - name: Add Flathub remote
        run: flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtime, SDK, and OpenJDK extension
        run: |
          flatpak install -y --noninteractive --user flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Sdk.Extension.openjdk21//24.08

      # Ant's -init target uses a Nashorn scriptdef (removed in JDK 15+),
      # and JDK 8 is the only JDK set up on this runner, so no override
      # is needed here (unlike the rpm/deb jobs, jpackage isn't involved —
      # flatpak-builder gets its JDK from the SDK extension instead).
      - name: Stage app image
        env:
          JRE_DIR: ${{ env.JAVA_HOME }}/jre
        run: |
          echo JRE_DIR=$JRE_DIR
          ant app-image-linux

      - name: Build Flatpak
        working-directory: packaging/flatpak
        run: |
          flatpak-builder --force-clean --disable-rofiles-fuse --user \
            --repo=${{ github.workspace }}/build/flatpak-repo \
            ${{ github.workspace }}/build/flatpak-build \
            com.romraider.RomRaider.yml

      - name: Bundle single-file .flatpak
        run: |
          flatpak build-bundle build/flatpak-repo build/romraider.flatpak com.romraider.RomRaider

      - name: Upload .flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: romraider-flatpak
          path: build/romraider.flatpak

  # Only runs on a pushed tag (e.g. `git tag v1.1.0 && git push origin v1.1.0`).
  # `on: push` with no branches/tags filter already fires for tag pushes, so
  # every job above runs as usual; this job just gates on the ref being a tag
  # and waits for the Linux jobs to produce something to publish. Windows
  # isn't included in releases here — get Windows builds from the upstream
  # RomRaider/RomRaider repo instead; the `build` job above still runs on
  # every push/PR as a compile check, it just isn't a release input.
  release:
    needs: [build-fedora, build-ubuntu, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          case "${{ github.ref_name }}" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "${{ github.ref_name }}" \
            artifacts/*/* \
            --title "RomRaider ${{ github.ref_name }}" \
            --generate-notes \
            $prerelease_flag
